<!-- ========== NAVBAR ========== -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-background/80 border-b border-border/50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2 group">
            <img src="assets/images/adnate-logo.png" alt="Adnate IT Solutions" class="h-10 w-auto object-contain group-hover:scale-105 transition-transform duration-300" />
        </a>

        <!-- Nav Links -->
        <div class="hidden md:flex items-center gap-8">
            <a routerLink="/" fragment="features"
                class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors duration-200">Features</a>
            <a routerLink="/" fragment="stats"
                class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors duration-200">About</a>
            <a routerLink="/" fragment="testimonials"
                class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors duration-200">Testimonials</a>
            <a routerLink="/career"
                class="text-sm font-medium text-primary hover:text-primary/80 transition-colors duration-200">Career</a>
        </div>

        <!-- Auth Buttons -->
        <div class="flex items-center gap-3">
            <a routerLink="/login" id="nav-login-btn"
                class="px-5 py-2.5 text-sm font-semibold text-foreground hover:text-primary border border-border rounded-xl hover:border-primary/50 transition-all duration-300 hover:shadow-md">
                Log In
            </a>
            <a routerLink="/signup" id="nav-signup-btn"
                class="px-5 py-2.5 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
                Sign Up Free
            </a>
        </div>
    </div>
</nav>

<!-- Jobs List Section -->
<section class="min-h-screen pt-32 pb-20 px-6 bg-background">
    <div class="max-w-5xl mx-auto">
        <!-- Header & Sorting -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight mb-2">Open Positions</h1>
                <p class="text-muted-foreground text-lg">Join us and do the best work of your life.</p>
            </div>
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                <div class="relative w-full sm:w-64 lg:w-80">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                    <input type="text" [(ngModel)]="searchQuery" (input)="filterJobs()" placeholder="Search jobs, company, location..." class="w-full pl-9 pr-4 py-2.5 text-sm bg-card border border-border rounded-lg focus:outline-none focus:border-primary/50 transition-colors shadow-sm text-foreground">
                </div>
                <button (click)="sortByCompany()"
                    class="w-full sm:w-auto px-4 py-2.5 text-sm font-semibold text-foreground bg-card border border-border rounded-lg hover:border-primary/40 hover:bg-card/80 transition-all duration-200 shadow-sm flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
                    </svg>
                    Sort by Company
                </button>
            </div>
        </div>

        <!-- Jobs Grid/List -->
        <div class="space-y-4">
            <div *ngFor="let job of filteredJobs" 
                class="group bg-card border border-border rounded-2xl p-6 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-lg hover:border-primary/30 transition-all duration-300">
                
                <div class="flex-1">
                    <h3 class="text-xl font-bold text-foreground mb-2 group-hover:text-primary transition-colors">{{ job.title }}</h3>
                    <div class="flex flex-wrap items-center gap-4 text-sm text-muted-foreground">
                        <div class="flex items-center gap-1.5 font-medium text-foreground/80">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Z" />
                            </svg>
                            {{ job.company }}
                        </div>
                        <div class="flex items-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                            </svg>
                            {{ job.location }}
                        </div>
                        <div class="flex items-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                            </svg>
                            {{ job.type }}
                        </div>
                    </div>
                </div>

                <div class="shrink-0">
                    <button class="w-full md:w-auto px-6 py-2.5 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
                        Apply Now
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div *ngIf="filteredJobs.length === 0" class="text-center py-20 bg-card rounded-2xl border border-border mt-10">
            <h3 class="text-xl font-semibold text-foreground mb-2">No open positions</h3>
            <p class="text-muted-foreground">Check back later for new opportunities.</p>
        </div>
    </div>
</section>
