<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 py-12">
    <!-- Background decorations -->
    <div class="absolute inset-0 -z-10">
        <div
            class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-secondary/30 via-background to-primary/5">
        </div>
        <div class="absolute top-20 right-20 w-80 h-80 bg-primary/8 rounded-full blur-[120px] animate-float"></div>
        <div
            class="absolute bottom-20 left-20 w-64 h-64 bg-accent/6 rounded-full blur-[100px] animate-float animation-delay-400">
        </div>
    </div>
    <!-- Grid pattern -->
    <div class="absolute inset-0 -z-10 opacity-[0.02]"
        style="background-image: radial-gradient(circle, var(--foreground) 1px, transparent 1px); background-size: 32px 32px;">
    </div>

    <div class="w-full max-w-md">
        <!-- Logo & Back to home -->
        <div class="text-center mb-8 animate-fade-in-up">
            <a routerLink="/" class="inline-flex items-center gap-3 group mb-6">
                <img src="assets/images/adnate-logo.png" alt="Adnate IT Solutions"
                    class="h-12 w-auto object-contain group-hover:scale-105 transition-transform duration-300" />

            </a>
            <h1 class="text-3xl font-extrabold tracking-tight text-foreground">Welcome back</h1>
            <p class="text-muted-foreground mt-2">Sign in to your ADNATE IT account</p>
        </div>

        <!-- Login Card -->
        <div class="animate-fade-in-up animation-delay-200 bg-card rounded-3xl border border-border shadow-xl p-8">
            <!-- Login Type Toggle -->
            <div class="flex p-1 mb-6 bg-muted/50 rounded-xl border border-border">
                <button type="button" (click)="loginType = 'candidate'"
                    [class.bg-background]="loginType === 'candidate'" [class.shadow-sm]="loginType === 'candidate'"
                    [class.text-foreground]="loginType === 'candidate'"
                    [class.text-muted-foreground]="loginType !== 'candidate'"
                    class="flex-1 py-2.5 px-4 text-sm font-medium rounded-lg transition-all duration-200">
                    Candidate
                </button>
                <button type="button" (click)="loginType = 'employee'" [class.bg-background]="loginType === 'employee'"
                    [class.shadow-sm]="loginType === 'employee'" [class.text-foreground]="loginType === 'employee'"
                    [class.text-muted-foreground]="loginType !== 'employee'"
                    class="flex-1 py-2.5 px-4 text-sm font-medium rounded-lg transition-all duration-200">
                    Employee
                </button>
            </div>

            <!-- Social Login (Candidate Only) -->
            <ng-container *ngIf="loginType === 'candidate'">
                <div class="space-y-3 mb-6">
                    <button id="google-login-btn" type="button"
                        class="w-full flex items-center justify-center gap-3 px-4 py-3 text-sm font-medium text-foreground bg-background border border-border rounded-xl hover:bg-muted hover:shadow-md transition-all duration-300 hover:border-primary/30">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Continue with Google
                    </button>
                    <button id="microsoft-login-btn" type="button"
                        class="w-full flex items-center justify-center gap-3 px-4 py-3 text-sm font-medium text-foreground bg-background border border-border rounded-xl hover:bg-muted hover:shadow-md transition-all duration-300 hover:border-primary/30">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022" />
                            <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00" />
                            <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF" />
                            <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900" />
                        </svg>
                        Continue with Microsoft
                    </button>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-border"></div>
                    <span class="text-xs font-medium text-muted-foreground uppercase tracking-wider">or continue with
                        email</span>
                    <div class="flex-1 h-px bg-border"></div>
                </div>
            </ng-container>

            <!-- Error Message -->
            <div *ngIf="errorMessage" class="mb-4 p-3 rounded-xl text-sm font-medium"
                style="background: rgba(220,53,69,0.08); color: #c0392b; border: 1px solid rgba(220,53,69,0.15);">
                {{ errorMessage }}
            </div>

            <!-- Login Form -->
            <form (ngSubmit)="onLogin()" class="space-y-5">
                <!-- Email (Candidate Only) -->
                <div *ngIf="loginType === 'candidate'">
                    <label for="login-email" class="block text-sm font-medium text-foreground mb-2">Email
                        address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                            </svg>
                        </div>
                        <input type="email" id="login-email" [(ngModel)]="email" name="email"
                            placeholder="you@company.com" [required]="loginType === 'candidate'"
                            class="w-full pl-12 pr-4 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                    </div>
                </div>

                <!-- Employee ID (Employee Only) -->
                <div *ngIf="loginType === 'employee'">
                    <label for="login-empid" class="block text-sm font-medium text-foreground mb-2">Employee ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
                            </svg>
                        </div>
                        <input type="text" id="login-empid" [(ngModel)]="empId" name="empId" placeholder="e.g. EMP12345"
                            [required]="loginType === 'employee'"
                            class="w-full pl-12 pr-4 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="login-password" class="block text-sm font-medium text-foreground">Password</label>
                        <a href="#"
                            class="text-xs font-medium text-primary hover:text-primary/80 transition-colors">Forgot
                            password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                            </svg>
                        </div>
                        <input [type]="showPassword ? 'text' : 'password'" id="login-password" [(ngModel)]="password"
                            name="password" placeholder="Enter your password" required
                            class="w-full pl-12 pr-12 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                        <button type="button" (click)="togglePasswordVisibility()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-muted-foreground hover:text-foreground transition-colors">
                            <span *ngIf="!showPassword">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </span>
                            <span *ngIf="showPassword">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Remember me -->
                <!-- <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember-me" [(ngModel)]="rememberMe" name="rememberMe"
                        class="w-4 h-4 rounded border-input text-primary focus:ring-ring accent-primary" />
                    <label for="remember-me" class="text-sm text-muted-foreground">Remember me for 30 days</label>
                </div> -->

                <!-- Submit -->
                <button type="submit" id="login-submit-btn" [disabled]="loading"
                    class="w-full py-3.5 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-[1.01] active:scale-[0.99] disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100">
                    <span *ngIf="!loading">Sign In</span>
                    <span *ngIf="loading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Signing in…
                    </span>
                </button>
            </form>
        </div>

        <!-- Sign up link -->
        <p *ngIf="loginType === 'candidate'"
            class="animate-fade-in-up animation-delay-400 text-center text-sm text-muted-foreground mt-6">
            Don't have an account?
            <a routerLink="/signup"
                class="font-semibold text-primary hover:text-primary/80 transition-colors ml-1">Create one free</a>
        </p>
    </div>
</div>
