<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 py-12">
    <!-- Background decorations -->
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <img src="assets/images/bg_img.png" alt="" class="w-full h-full object-cover opacity-30 blur-sm scale-110 sepia-[0.3]" />
        <div class="absolute inset-0 bg-gradient-to-bl from-primary/5 via-background/80 to-secondary/30"></div>
        <div class="absolute top-40 left-20 w-80 h-80 bg-primary/8 rounded-full blur-[120px] animate-float"></div>
        <div
            class="absolute bottom-10 right-10 w-64 h-64 bg-accent/6 rounded-full blur-[100px] animate-float animation-delay-400">
        </div>
    </div>
    <div class="absolute inset-0 -z-10 opacity-[0.02]"
        style="background-image: radial-gradient(circle, var(--foreground) 1px, transparent 1px); background-size: 32px 32px;">
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-in-up">
            <a routerLink="/" class="inline-flex items-center gap-3 group mb-6">
                <img src="assets/images/adnate-logo.png" alt="Adnate IT Solutions" class="h-12 w-auto object-contain group-hover:scale-105 transition-transform duration-300" />
            </a>
            <h1 class="text-3xl font-extrabold tracking-tight text-foreground">Create your account</h1>
            <!-- <p class="text-muted-foreground mt-2">Start your free 14-day trial — no credit card required</p> -->
        </div>

        <!-- Signup Card -->
        <div class="animate-fade-in-up animation-delay-200 bg-card rounded-3xl border border-border shadow-xl p-8">
            <!-- Social Signup -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="google-signup-btn" type="button"
                    class="flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-foreground bg-background border border-border rounded-xl hover:bg-muted hover:shadow-md transition-all duration-300 hover:border-primary/30">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
                <button id="microsoft-signup-btn" type="button"
                    class="flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-foreground bg-background border border-border rounded-xl hover:bg-muted hover:shadow-md transition-all duration-300 hover:border-primary/30">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022" />
                        <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00" />
                        <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF" />
                        <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900" />
                    </svg>
                    Microsoft
                </button>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-border"></div>
                <span class="text-xs font-medium text-muted-foreground uppercase tracking-wider">or</span>
                <div class="flex-1 h-px bg-border"></div>
            </div>

            <!-- SignUp Form -->
            <form (ngSubmit)="onSignup()" class="space-y-4">
                <!-- Full Name -->
                <div>
                    <label for="signup-name" class="block text-sm font-medium text-foreground mb-2">Full name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                            </svg>
                        </div>
                        <input type="text" id="signup-name" [(ngModel)]="fullName" name="fullName"
                            placeholder="John Doe" required
                            class="w-full pl-12 pr-4 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="signup-email" class="block text-sm font-medium text-foreground mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                            </svg>
                        </div>
                        <input type="email" id="signup-email" [(ngModel)]="email" name="email"
                            placeholder="you@company.com" required
                            class="w-full pl-12 pr-4 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                    </div>
                </div>

                <!-- Company -->
                <!-- <div>
                    <label for="signup-company" class="block text-sm font-medium text-foreground mb-2">Company
                        name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
                            </svg>
                        </div>
                        <input type="text" id="signup-company" [(ngModel)]="company" name="company"
                            placeholder="Acme Corp"
                            class="w-full pl-12 pr-4 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                    </div>
                </div> -->

                <!-- Password -->
                <div>
                    <label for="signup-password" class="block text-sm font-medium text-foreground mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                            </svg>
                        </div>
                        <input [type]="showPassword ? 'text' : 'password'" id="signup-password" [(ngModel)]="password"
                            name="password" placeholder="Min. 8 characters" required
                            class="w-full pl-12 pr-12 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                        <button type="button" (click)="togglePasswordVisibility()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-muted-foreground hover:text-foreground transition-colors">
                            <span *ngIf="!showPassword">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                            </span>
                            <span *ngIf="showPassword">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                            </span>
                        </button>
                    </div>
                    <!-- Password strength meter -->
                    <div *ngIf="password" class="mt-2">
                        <div class="flex gap-1">
                            <div class="h-1 flex-1 rounded-full transition-all duration-300"
                                [class]="passwordStrength === 'weak' ? 'bg-destructive' : passwordStrength === 'medium' ? 'bg-primary' : 'bg-green-500'">
                            </div>
                            <div class="h-1 flex-1 rounded-full transition-all duration-300"
                                [class]="passwordStrength === 'medium' ? 'bg-primary' : passwordStrength === 'strong' ? 'bg-green-500' : 'bg-border'">
                            </div>
                            <div class="h-1 flex-1 rounded-full transition-all duration-300"
                                [class]="passwordStrength === 'strong' ? 'bg-green-500' : 'bg-border'"></div>
                        </div>
                        <p class="text-xs mt-1"
                            [class]="passwordStrength === 'weak' ? 'text-destructive' : passwordStrength === 'medium' ? 'text-primary' : 'text-green-500'">
                            {{ passwordStrength === 'weak' ? 'Weak password' : passwordStrength === 'medium' ? 'Good
                            password' : 'Strong password' }}
                        </p>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="signup-confirm-password" class="block text-sm font-medium text-foreground mb-2">Confirm
                        password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5 text-muted-foreground">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
                            </svg>
                        </div>
                        <input [type]="showConfirmPassword ? 'text' : 'password'" id="signup-confirm-password"
                            [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Re-enter your password"
                            required
                            class="w-full pl-12 pr-12 py-3 text-sm text-foreground bg-background border border-input rounded-xl placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all duration-200" />
                        <button type="button" (click)="toggleConfirmPasswordVisibility()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-muted-foreground hover:text-foreground transition-colors">
                            <span *ngIf="!showConfirmPassword">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                            </span>
                            <span *ngIf="showConfirmPassword">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                            </span>
                        </button>
                    </div>
                    <p *ngIf="confirmPassword && !passwordsMatch" class="text-xs text-destructive mt-1">Passwords do not match</p>
                    <p *ngIf="passwordsMatch" class="text-xs text-green-500 mt-1">✓ Passwords match</p>
                </div>

                <!-- Terms -->
                <div class="flex items-start gap-2 pt-1">
                    <input type="checkbox" id="agree-terms" [(ngModel)]="agreeToTerms" name="agreeToTerms"
                        class="w-4 h-4 mt-0.5 rounded border-input text-primary focus:ring-ring accent-primary" />
                    <label for="agree-terms" class="text-sm text-muted-foreground leading-snug">
                        I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a
                            href="#" class="text-primary hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="signup-submit-btn" [disabled]="!agreeToTerms || loading"
                    class="w-full py-3.5 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-[1.01] active:scale-[0.99] disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100">
                    <span *ngIf="!loading">Create Account</span>
                    <span *ngIf="loading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Creating Account…
                    </span>
                </button>
            </form>
        </div>

        <!-- Login link -->
        <p class="animate-fade-in-up animation-delay-400 text-center text-sm text-muted-foreground mt-6">
            Already have an account?
            <a routerLink="/login" class="font-semibold text-primary hover:text-primary/80 transition-colors ml-1">Sign
                in</a>
        </p>
    </div>
</div>
