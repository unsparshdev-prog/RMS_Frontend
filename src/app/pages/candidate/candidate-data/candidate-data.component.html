<div class="max-w-3xl mx-auto space-y-8">
    <!-- Page Header -->
    <div>
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-foreground">My Profile</h1>
        <p class="text-muted-foreground mt-1">Manage your personal and professional information</p>
    </div>

    <!-- Profile Card -->
    <div class="bg-card border border-border rounded-2xl p-6 md:p-8 shadow-sm">
        <!-- Avatar section -->
        <div class="flex items-center gap-5 mb-8 pb-6 border-b border-border">
            <div
                class="w-20 h-20 rounded-2xl bg-primary/15 flex items-center justify-center text-2xl font-extrabold text-primary">
                {{ profile.firstName.charAt(0) }}{{ profile.lastName.charAt(0) }}
            </div>
            <div>
                <h2 class="text-xl font-bold text-foreground">{{ profile.firstName }} {{ profile.lastName }}</h2>
                <p class="text-sm text-muted-foreground">{{ profile.currentRole }} at {{ profile.currentCompany }}</p>
            </div>
        </div>

        <form (ngSubmit)="onSave()" class="space-y-6">
            <!-- Name row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">First Name</label>
                    <input type="text" [(ngModel)]="profile.firstName" name="firstName"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Last Name</label>
                    <input type="text" [(ngModel)]="profile.lastName" name="lastName"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
            </div>

            <!-- Contact row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Email</label>
                    <input type="email" [(ngModel)]="profile.email" name="email"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Phone</label>
                    <input type="tel" [(ngModel)]="profile.phone" name="phone"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
            </div>

            <!-- Location & Experience -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Location</label>
                    <input type="text" [(ngModel)]="profile.location" name="location"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Years of Experience</label>
                    <input type="text" [(ngModel)]="profile.experience" name="experience"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
            </div>

            <!-- Current Role -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Current Role</label>
                    <input type="text" [(ngModel)]="profile.currentRole" name="currentRole"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Current Company</label>
                    <input type="text" [(ngModel)]="profile.currentCompany" name="currentCompany"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
            </div>

            <!-- Skills -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">Skills</label>
                <input type="text" [(ngModel)]="profile.skills" name="skills"
                    placeholder="e.g. Angular, TypeScript, Node.js"
                    class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground placeholder:text-muted-foreground/60" />
            </div>

            <!-- Education -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">Education</label>
                <input type="text" [(ngModel)]="profile.education" name="education"
                    class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
            </div>

            <!-- Links -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">LinkedIn</label>
                    <input type="url" [(ngModel)]="profile.linkedin" name="linkedin"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Portfolio</label>
                    <input type="url" [(ngModel)]="profile.portfolio" name="portfolio"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground" />
                </div>
            </div>

            <!-- About -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">About</label>
                <textarea [(ngModel)]="profile.about" name="about" rows="4"
                    class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground resize-none"></textarea>
            </div>

            <!-- Submit -->
            <div class="flex justify-end pt-2">
                <button type="submit"
                    class="px-8 py-3 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.01] active:scale-[0.99] transition-all duration-300">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
