<div class="space-y-6">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-foreground">Apply for Jobs</h1>
            <p class="text-muted-foreground mt-1">Browse and apply to open positions</p>
        </div>
        <!-- Search -->
        <div class="relative w-full md:w-80">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor"
                class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input type="text" [(ngModel)]="searchQuery" (input)="filterJobs()"
                placeholder="Search jobs, company, location..."
                class="w-full pl-10 pr-4 py-2.5 text-sm bg-card border border-border rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground placeholder:text-muted-foreground/60" />
        </div>
    </div>

    <!-- Results count -->
    <p class="text-sm text-muted-foreground">Showing <span class="font-semibold text-foreground">{{ filteredJobs.length }}</span> open positions</p>

    <!-- Job Cards Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div *ngFor="let job of filteredJobs"
            class="bg-card border border-border rounded-2xl p-6 hover:shadow-lg hover:border-primary/30 transition-all duration-300 group flex flex-col">
            <div class="flex items-start justify-between mb-3">
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-foreground group-hover:text-primary transition-colors">{{
                        job.title }}</h3>
                    <p class="text-sm font-medium text-muted-foreground mt-0.5">{{ job.company }}</p>
                </div>
                <span
                    class="shrink-0 ml-3 px-3 py-1 text-xs font-semibold rounded-full"
                    [ngClass]="job.type === 'Full-time' ? 'bg-green-500/10 text-green-600' : 'bg-primary/10 text-primary'">
                    {{ job.type }}
                </span>
            </div>

            <p class="text-sm text-muted-foreground leading-relaxed mb-4 flex-1">{{ job.description }}</p>

            <div class="flex flex-wrap items-center gap-3 text-xs text-muted-foreground mb-4">
                <span class="flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                    </svg>
                    {{ job.location }}
                </span>
                <span class="flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
                    </svg>
                    {{ job.salary }}
                </span>
                <span class="flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    {{ job.posted }}
                </span>
            </div>

            <button (click)="applyForJob(job.id)"
                class="w-full py-2.5 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-md hover:shadow-lg hover:scale-[1.01] active:scale-[0.99] transition-all duration-300">
                Apply Now
            </button>
        </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredJobs.length === 0"
        class="text-center py-16 bg-card rounded-2xl border border-border">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-12 h-12 text-muted-foreground mx-auto mb-4">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <h3 class="text-lg font-semibold text-foreground mb-1">No jobs found</h3>
        <p class="text-muted-foreground text-sm">Try adjusting your search criteria</p>
    </div>
</div>
