<div class="max-w-4xl mx-auto space-y-8">
    <!-- Page Header -->
    <div>
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-foreground">Resume Upload</h1>
        <p class="text-muted-foreground mt-1">Upload and manage your resumes and cover letters</p>
    </div>

    <!-- Upload Zone -->
    <div (dragover)="onDragOver($event)" (dragleave)="onDragLeave()" (drop)="onDrop($event)"
        [ngClass]="{'border-primary bg-primary/5': isDragging}"
        class="relative border-2 border-dashed border-border rounded-2xl p-12 text-center hover:border-primary/50 hover:bg-primary/5 transition-all duration-300 cursor-pointer group">
        <input type="file" (change)="onFileSelect($event)" multiple accept=".pdf,.doc,.docx"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" id="resume-file-input" />

        <div class="flex flex-col items-center gap-4">
            <div
                class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-all duration-300 group-hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
                </svg>
            </div>
            <div>
                <p class="text-foreground font-semibold text-lg">
                    <span class="text-primary">Click to upload</span> or drag and drop
                </p>
                <p class="text-sm text-muted-foreground mt-1">PDF, DOC, or DOCX (Max 10MB)</p>
            </div>
        </div>
    </div>

    <!-- Uploaded Files -->
    <div *ngIf="files.length > 0">
        <h2 class="text-lg font-bold text-foreground mb-4">Uploaded Documents</h2>
        <div class="space-y-3">
            <div *ngFor="let file of files; let i = index"
                class="flex items-center justify-between bg-card border border-border rounded-xl p-4 hover:shadow-md hover:border-primary/20 transition-all duration-200 group">
                <div class="flex items-center gap-4">
                    <div
                        class="w-11 h-11 rounded-xl flex items-center justify-center text-xs font-bold"
                        [ngClass]="file.type === 'PDF' ? 'bg-red-500/10 text-red-500' : 'bg-blue-500/10 text-blue-500'">
                        {{ file.type }}
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-foreground">{{ file.name }}</p>
                        <p class="text-xs text-muted-foreground">{{ file.size }} · {{ file.date }}</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        class="p-2 rounded-lg text-muted-foreground hover:text-primary hover:bg-primary/10 transition-all duration-200"
                        title="Download">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                        </svg>
                    </button>
                    <button (click)="removeFile(i)"
                        class="p-2 rounded-lg text-muted-foreground hover:text-destructive hover:bg-destructive/10 transition-all duration-200"
                        title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
